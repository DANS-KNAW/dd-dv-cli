api:
  baseUrl: "http://localhost:8080"
  apiKey: "your-api-token"
  #unblockKey: your-unblock-key
  #databaseUrl: "jdbc:postgresql://localhost:5432/dvndb"
  #databaseUser: "dvnuser"
  #databasePassword: "your-database-password"

# The public base URL of the Dataverse instance. If running dv on a different machine, this will differ from api.baseUrl.
# This setting is required when using dv dataset-direct-upload.
externalBaseUrl: https://your-dataverse-instance.com

archivalCopy:
    outbox: /var/opt/dans.knaw.nl/tmp/dve-outbox
    freeSpaceMargin: 5G
    sleep: 1 minute

#
# See https://www.dropwizard.io/en/latest/manual/configuration.html#logging
#
logging:
  level: INFO
  appenders:
    - type: file
      archive: false
      timeZone: system
      currentLogFilename: ${HOME}/dv.log
